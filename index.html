<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>API Dashboard</h1>
    </header>

    <div id="error-box" class="hidden"></div>

    <main>
        <section id="data-display">
            <h2>Fetched Items</h2>
            <div id="items-container">Loading...</div>
        </section>

        <section id="form-section">
            <h2>Add New Item</h2>
            <form id="data-form">
                <input type="text" id="input-title" placeholder="Enter title" required>
                <textarea id="input-body" placeholder="Enter description" required></textarea>
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <!-- The order of these scripts is very important! -->
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
